name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Chrome MV3 Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Zip
        run: pnpm run zip

      - name: Collect zip
        run: |
          mkdir -p dist
          zip_file="$(find .output -maxdepth 1 -type f -name '*-chrome.zip' -print -quit)"
          if [ -z "$zip_file" ]; then
            echo "No Chrome zip was generated."
            find .output -maxdepth 2 -type f -print
            exit 1
          fi
          cp "$zip_file" dist/

      - name: Upload Chrome MV3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3-extension
          path: .output/chrome-mv3
          if-no-files-found: error

      - name: Upload Chrome MV3 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3-extension-zip
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
